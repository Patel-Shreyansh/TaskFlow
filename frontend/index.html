<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow - Task Management</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✅</text></svg>">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>📋 TaskFlow</h2>

  <ul>
    <li class="menu-item active" data-page="dashboard">Dashboard</li>
    <li class="menu-item" data-page="tasks">Tasks</li>
    <li class="menu-item" data-page="members">Members</li>
    <li class="menu-item" data-page="teams">Teams</li>
    <li class="menu-item" data-page="progress">Progress</li>
  </ul>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
  <h2 id="pageTitle">Dashboard</h2>
  <div class="topbar-right">
    <span class="username-badge" id="usernameBadge"></span>
    <button class="icon-btn" id="themeToggle" type="button" title="Toggle dark mode">🌙</button>
    <button class="icon-btn" id="logoutBtn" type="button">Log out</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page active">
  <div class="cards">
    <div class="card"><span>Total Tasks</span><h2 id="totalTasks">0</h2></div>
    <div class="card completed"><span>Completed</span><h2 id="completedTasks">0</h2></div>
    <div class="card"><span>In Progress</span><h2 id="inProgressTasks">0</h2></div>
    <div class="card overdue"><span>Overdue</span><h2 id="overdueTasks">0</h2></div>
    <div class="card"><span>Members</span><h2 id="totalMembers">0</h2></div>
  </div>
</div>

<!-- TASKS -->
<div id="tasks" class="page">

  <div class="task-form">
    <input type="text" id="taskTitle" placeholder="Task title">
    <input type="text" id="taskDescription" placeholder="Description (optional)">
    <select id="taskPriority">
      <option value="low">Low priority</option>
      <option value="medium" selected>Medium priority</option>
      <option value="high">High priority</option>
    </select>
    <select id="taskAssignee">
      <option value="">Assign to</option>
    </select>
    <input type="date" id="taskDeadline">
    <button id="createTask" type="button">Create Task</button>
  </div>

  <div class="toolbar">
    <input type="text" id="taskSearch" placeholder="Search tasks...">
    <select id="priorityFilter">
      <option value="">All priorities</option>
      <option value="low">Low</option>
      <option value="medium">Medium</option>
      <option value="high">High</option>
    </select>
  </div>

  <div class="board">
    <div class="column" data-status="todo">
      <h3>To Do <span id="todoCount">0</span></h3>
      <div id="todoList"></div>
    </div>

    <div class="column" data-status="inprogress">
      <h3>In Progress <span id="inprogressCount">0</span></h3>
      <div id="inprogressList"></div>
    </div>

    <div class="column" data-status="completed">
      <h3>Completed <span id="completedCount">0</span></h3>
      <div id="completedList"></div>
    </div>
  </div>
</div>

<!-- MEMBERS -->
<div id="members" class="page">
  <div class="task-form">
    <input type="text" id="memberName" placeholder="Member name">
    <input type="email" id="memberEmail" placeholder="Email (optional)">
    <button id="memberAdd" type="button">Add Member</button>
  </div>
  <div id="membersList"></div>
</div>

<!-- TEAMS -->
<div id="teams" class="page">
  <div class="task-form">
    <input type="text" id="teamName" placeholder="Team name">
    <select id="teamMembers" multiple size="4"></select>
    <button id="teamAdd" type="button">Create Team</button>
  </div>
  <div id="teamsList"></div>
</div>

<!-- PROGRESS -->
<div id="progress" class="page">
  <div class="progress-track">
    <div id="progressBar" class="progress-fill"></div>
  </div>
  <p id="progressText"></p>

  <div class="priority-breakdown" id="priorityBreakdown"></div>
</div>

</div>
</div>

<script src="js/api.js"></script>
<script src="js/toast.js"></script>
<script src="js/app.js"></script>
</body>
</html>
